<meta name="mobile-web-app-capable" content="yes">

<title>모아</title>
<style>
:root{
  --bg:#F4F4FA; --card:#FFFFFF; --txt:#26243B; --sub:#8A88A3; --line:#ECEAF6;
  --accent:#6C5CE7; --accent-soft:#EEEBFF; --danger:#E05B5B;
  --kids:#E84393; --shopping:#E67E22; --work:#0984E3; --schedule:#6C5CE7; --todo:#00B894;
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#17161F; --card:#221F2E; --txt:#F0EEF8; --sub:#8E8BA6; --line:#312D42; --accent-soft:#322B55; }
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg); color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Malgun Gothic",sans-serif;
  padding-bottom:60px;
}
.wrap{max-width:560px;margin:0 auto;padding:0 14px;}
header{padding:calc(14px + env(safe-area-inset-top)) 2px 6px;display:flex;align-items:baseline;justify-content:space-between;}
header h1{font-size:22px;margin:0;letter-spacing:-0.5px;}
header h1 span{color:var(--accent);}
header .date{font-size:13px;color:var(--sub);}
.inputbar{
  display:flex;gap:8px;align-items:center;background:var(--card);
  border:1.5px solid var(--line);border-radius:18px;padding:6px 6px 6px 14px;
  box-shadow:0 4px 14px rgba(60,50,140,.06);
  position:sticky;top:8px;z-index:20;
}
.inputbar input{
  flex:1;border:0;outline:0;background:transparent;color:var(--txt);
  font-size:16px;padding:10px 0;min-width:0;
}
.inputbar input::placeholder{color:var(--sub);}
.iconbtn{
  border:0;background:transparent;color:var(--sub);width:40px;height:40px;
  border-radius:50%;font-size:19px;cursor:pointer;flex:none;display:flex;align-items:center;justify-content:center;
}
.iconbtn.rec{color:#fff;background:var(--danger);animation:pulse 1.2s infinite;}
@keyframes pulse{50%{opacity:.55;}}
.addbtn{
  border:0;background:var(--accent);color:#fff;width:40px;height:40px;border-radius:14px;
  font-size:20px;cursor:pointer;flex:none;display:flex;align-items:center;justify-content:center;
}
.addbtn:disabled{opacity:.4;}
.hint{font-size:12px;color:var(--sub);text-align:center;margin:8px 0 0;}
.chips{display:flex;gap:6px;overflow-x:auto;padding:12px 2px 4px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{
  border:0;background:var(--card);color:var(--sub);border-radius:99px;
  padding:8px 13px;font-size:13.5px;font-weight:600;cursor:pointer;flex:none;
  border:1.5px solid var(--line);
}
.chip .n{font-size:11.5px;opacity:.75;margin-left:3px;}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.list{margin-top:6px;}
.item{
  display:flex;align-items:flex-start;gap:10px;background:var(--card);
  border-radius:16px;padding:12px 12px;margin-bottom:8px;border:1px solid var(--line);
}
.item.done{opacity:.5;}
.item.done .txt{text-decoration:line-through;}
.check{
  flex:none;width:24px;height:24px;border-radius:50%;border:2px solid var(--sub);
  background:transparent;cursor:pointer;margin-top:2px;position:relative;
}
.item.done .check{background:var(--accent);border-color:var(--accent);}
.item.done .check:after{content:"✓";color:#fff;font-size:14px;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.body{flex:1;min-width:0;}
.txt{font-size:15.5px;line-height:1.45;word-break:break-all;}
.meta{display:flex;gap:6px;margin-top:6px;align-items:center;flex-wrap:wrap;}
.cat{
  border:0;font-size:11.5px;font-weight:700;color:#fff;border-radius:7px;
  padding:3px 8px;cursor:pointer;
}
.due{font-size:12px;color:var(--sub);font-weight:600;}
.due.today{color:var(--accent);}
.due.over{color:var(--danger);}
.del{
  border:0;background:transparent;color:var(--sub);font-size:17px;cursor:pointer;
  flex:none;padding:2px 6px;opacity:.5;
}
.empty{text-align:center;color:var(--sub);padding:48px 0;font-size:14.5px;line-height:1.8;}
.empty b{font-size:30px;display:block;margin-bottom:6px;}
.donetoggle{
  display:block;margin:14px auto 8px;border:0;background:transparent;color:var(--sub);
  font-size:13px;font-weight:600;cursor:pointer;padding:8px;
}
/* PIN screen */
#pinview{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;align-items:center;justify-content:center;}
#pinview .box{text-align:center;padding:24px;}
#pinview h2{font-size:20px;margin:0 0 4px;}
#pinview p{color:var(--sub);font-size:13.5px;margin:0 0 20px;}
#pinview input{
  font-size:26px;letter-spacing:12px;text-align:center;width:190px;padding:10px;
  border:1.5px solid var(--line);border-radius:14px;background:var(--card);color:var(--txt);outline:0;
}
#pinview .err{color:var(--danger);font-size:13px;height:18px;margin-top:10px;}
/* category picker sheet */
#sheet{position:fixed;inset:0;background:rgba(20,18,35,.45);z-index:90;display:none;align-items:flex-end;justify-content:center;}
#sheet.on{display:flex;}
#sheet .panel{
  background:var(--card);width:100%;max-width:560px;border-radius:22px 22px 0 0;
  padding:18px 18px calc(24px + env(safe-area-inset-bottom));
}
#sheet h3{margin:0 0 14px;font-size:15px;color:var(--sub);font-weight:600;}
#sheet .opts{display:flex;gap:8px;flex-wrap:wrap;}
#sheet .opts button{
  border:0;color:#fff;font-size:14px;font-weight:700;border-radius:12px;
  padding:12px 18px;cursor:pointer;flex:1;min-width:80px;
}
.toast{
  position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
  background:var(--txt);color:var(--bg);padding:10px 18px;border-radius:99px;
  font-size:13.5px;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;
}
.toast.on{opacity:.95;}
</style>

<div id="pinview">
  <div class="box">
    <h2>모아 🔒</h2>
    <p>PIN 4자리를 입력하세요</p>
    <input id="pininput" type="password" inputmode="numeric" maxlength="4" autocomplete="off">
    <div class="err" id="pinerr"></div>
  </div>
</div>

<div class="wrap">
  <header>
    <h1>모<span>아</span></h1>
    <div class="date" id="today"></div>
  </header>

  <div class="inputbar">
    <input id="inp" type="text" placeholder="뭐든 적어보세요. 알아서 정리돼요" enterkeyhint="done">

  <div class="chips" id="chips"></div>

</div>

<div id="sheet">
  <div class="panel">
    <h3>카테고리 바꾸기</h3>
    <div class="opts" id="sheetopts"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var BASE = 'https://ksqjcdelxrmylxjxdatq.supabase.co/functions/v1/app';
var CATS = {
  kids:     {label:'육아', color:'#E84393'},
  shopping: {label:'쇼핑', color:'#E67E22'},
  work:     {label:'업무', color:'#0984E3'},
  schedule: {label:'일정', color:'#6C5CE7'},
  todo:     {label:'할일', color:'#00B894'}
};
var FILTERS = [
  {id:'all', label:'전체'}, {id:'today', label:'오늘'}, {id:'schedule', label:'일정'},
  {id:'kids', label:'육아'}, {id:'shopping', label:'쇼핑'}, {id:'work', label:'업무'}, {id:'todo', label:'할일'}
];
var items = [];
var filter = 'all';
var showDone = false;
var pin = localStorage.getItem('moa_pin') || '';

/* ---------- 자동 분류 ---------- */
var KW = {
  kids: ['어린이집','유치원','등원','하원','알림장','준비물','예방접종','접종','소아과','이유식','분유','기저귀','물티슈','아기','애기','아가','키즈','놀이터','문화센터','학부모','학원','태권도','발레','피아노','숙제','아이','유아','육아','장난감','동화책'],
  shopping: ['사야','사기','살것','살 것','사와','사오','주문','구매','장보기','장 보','마트','쿠팡','컬리','다이소','올리브영','배송','택배','재구매','떨어졌','떨어짐','우유','계란','휴지','세제','샴푸','기저귀','물티슈','분유','간식'],
  work: ['회의','미팅','보고서','보고','결재','품의','메일','회신','제출','마감','발표','출장','거래처','클라이언트','업무','회사','팀장','부장','공문','계약','견적','인수인계','워크숍','연차','반차'],
  schedule: ['약속','만나','만남','모임','예약','검진','진료','병원','치과','방문','상담','참석','행사','생일','기념일','모교','동창','결혼식','돌잔치']
};
var BUY_WORDS = ['사야','사기','살것','살 것','사와','사오','주문','구매','장보기','장 보','떨어졌','떨어짐','재구매'];

function classify(text){
  var scores = {kids:0, shopping:0, work:0, schedule:0};
  var k, i, w;
  for(k in KW){
    for(i=0;i<KW[k].length;i++){
      if(text.indexOf(KW[k][i]) >= 0) scores[k]++;
    }
  }
  /* 구매 동사가 있으면 쇼핑에 가중치 */
  for(i=0;i<BUY_WORDS.length;i++){
    if(text.indexOf(BUY_WORDS[i]) >= 0){ scores.shopping += 2; break; }
  }
  var due = parseDue(text);
  var order = ['shopping','kids','work','schedule'];
  var best = '', bestScore = 0;
  for(i=0;i<order.length;i++){
    if(scores[order[i]] > bestScore){ best = order[i]; bestScore = scores[order[i]]; }
  }
  var cat;
  if(bestScore === 0){
    cat = due ? 'schedule' : 'todo';
  }else{
    cat = best;
  }
  return {category:cat, due:due};
}

/* ---------- 한국어 날짜/시간 파싱 ---------- */
function parseDue(text){
  var now = new Date();
  var date = null, hasTime = false, hour = 0, min = 0;
  var m;

  if(text.indexOf('모레') >= 0){ date = addDays(now, 2); }
  else if(text.indexOf('내일') >= 0){ date = addDays(now, 1); }
  else if(text.indexOf('오늘') >= 0){ date = new Date(now); }

  if(!date){
    m = text.match(/(\d{1,2})\s*월\s*(\d{1,2})\s*일/);
    if(m){
      date = new Date(now.getFullYear(), parseInt(m[1],10)-1, parseInt(m[2],10));
      if(date < stripTime(now)) date.setFullYear(date.getFullYear()+1);
    }
  }
  if(!date){
    m = text.match(/(다음\s*주|이번\s*주)?\s*([월화수목금토일])요일/);
    if(m){
      var wmap = {'일':0,'월':1,'화':2,'수':3,'목':4,'금':5,'토':6};
      var w = wmap[m[2]];
      var dow = now.getDay();
      var delta;
      if(m[1] && m[1].indexOf('다음') >= 0){
        var toNextMon = (8 - (dow === 0 ? 7 : dow)) % 7; if(toNextMon === 0) toNextMon = 7;
        delta = toNextMon + ((w === 0 ? 7 : w) - 1);
      }else{
        delta = (w - dow + 7) % 7;
      }
      date = addDays(now, delta);
    }
  }

  m = text.match(/(오전|오후|아침|저녁|밤|새벽)?\s*(\d{1,2})\s*시\s*(반|(\d{1,2})\s*분)?/);
  if(m){
    hasTime = true;
    hour = parseInt(m[2],10);
    if(m[3] === '반') min = 30;
    else if(m[4]) min = parseInt(m[4],10);
    var mer = m[1] || '';
    if((mer === '오후' || mer === '저녁' || mer === '밤') && hour < 12) hour += 12;
    else if(!mer && hour >= 1 && hour <= 6) hour += 12; /* 3시 → 오후 3시로 추정 */
  }else{
    m = text.match(/(\d{1,2}):(\d{2})/);
    if(m){ hasTime = true; hour = parseInt(m[1],10); min = parseInt(m[2],10); }
  }

  if(!date && !hasTime) return null;
  if(!date){
    date = new Date(now);
    var cand = new Date(date.getFullYear(), date.getMonth(), date.getDate(), hour, min);
    if(cand < now) date = addDays(date, 1); /* 이미 지난 시각이면 내일로 */
  }
  if(hasTime){
    date = new Date(date.getFullYear(), date.getMonth(), date.getDate(), hour, min);
  }else{
    date = new Date(date.getFullYear(), date.getMonth(), date.getDate(), 0, 0, 0);
  }
  return date;
}
function addDays(d, n){ var r = new Date(d); r.setDate(r.getDate()+n); return r; }
function stripTime(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }

function dueLabel(iso){
  if(!iso) return null;
  var d = new Date(iso);
  var now = new Date();
  var t0 = stripTime(now).getTime();
  var d0 = stripTime(d).getTime();
  var hasTime = !(d.getHours() === 0 && d.getMinutes() === 0);
  var timeStr = '';
  if(hasTime){
    var h = d.getHours(), mm = d.getMinutes();
    var ap = h < 12 ? '오전' : '오후';
    var h12 = h % 12; if(h12 === 0) h12 = 12;
    timeStr = ' ' + ap + ' ' + h12 + '시' + (mm ? ' ' + mm + '분' : '');
  }
  var days = Math.round((d0 - t0) / 86400000);
  var cls = '', label = '';
  if(days < 0 || (days === 0 && hasTime && d < now)){ cls = 'over'; label = '지남'; if(days === 0) label = '오늘' + timeStr + ' · 지남'; }
  else if(days === 0){ cls = 'today'; label = '오늘' + timeStr; }
  else if(days === 1){ cls = 'today'; label = '내일' + timeStr; }
  else if(days <= 6){
    label = ['일','월','화','수','목','금','토'][d.getDay()] + '요일' + timeStr;
  }else{
    label = (d.getMonth()+1) + '/' + d.getDate() + timeStr;
  }
  return {cls:cls, label:label};
}

/* ---------- API ---------- */
function api(path, opts){
  opts = opts || {};
  opts.headers = opts.headers || {};
  opts.headers['x-pin'] = pin;
  if(opts.body) opts.headers['Content-Type'] = 'application/json';
  return fetch(BASE + path, opts).then(function(r){
    if(r.status === 401){ showPin(true); throw new Error('unauthorized'); }
    if(!r.ok) throw new Error('http ' + r.status);
    return r.status === 204 ? null : r.json();
  });
}

/* ---------- PIN ---------- */
function showPin(wrong){
  document.getElementById('pinview').style.display = 'flex';
  document.getElementById('pinerr').textContent = wrong ? 'PIN이 맞지 않아요' : '';
  var pi = document.getElementById('pininput');
  pi.value = '';
  setTimeout(function(){ pi.focus(); }, 50);
}
function hidePin(){ document.getElementById('pinview').style.display = 'none'; }

document.getElementById('pininput').addEventListener('input', function(){
  if(this.value.length === 4){
    var tryPin = this.value;
    fetch(BASE + '/api/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({pin:tryPin})})
      .then(function(r){
        if(r.ok){
          pin = tryPin;
          localStorage.setItem('moa_pin', pin);
          hidePin();
          load();
        }else{
          showPin(true);
        }
      });
  }
});

/* ---------- 데이터 ---------- */
function load(){
  api('/api/items').then(function(rows){
    items = rows;
    render();
  }).catch(function(e){});
}

function addItem(){
  var inp = document.getElementById('inp');
  var text = inp.value.trim();
  if(!text) return;
  var c = classify(text);
  inp.value = '';
  var body = {content:text, category:c.category, due_at: c.due ? c.due.toISOString() : null};
  api('/api/items', {method:'POST', body:JSON.stringify(body)}).then(function(row){
    items.unshift(row);
    render();
    toast(CATS[row.category].label + '에 담았어요');
  }).catch(function(){ toast('저장 실패 — 다시 시도해주세요'); inp.value = text; });
}

function toggleDone(it){
  var v = !it.done;
  it.done = v; it.done_at = v ? new Date().toISOString() : null;
  render();
  api('/api/items?id=' + it.id, {method:'PATCH', body:JSON.stringify({done:v})}).catch(function(){ load(); });
}
function removeItem(it){
  if(!confirm('삭제할까요?\n"' + it.content + '"')) return;
  items = items.filter(function(x){ return x.id !== it.id; });
  render();
  api('/api/items?id=' + it.id, {method:'DELETE'}).catch(function(){ load(); });
}
var sheetTarget = null;
function openSheet(it){
  sheetTarget = it;
  var box = document.getElementById('sheetopts');
  box.innerHTML = '';
  Object.keys(CATS).forEach(function(k){
    var b = document.createElement('button');
    b.style.background = CATS[k].color;
    b.textContent = CATS[k].label;
    if(k === it.category) b.style.outline = '3px solid rgba(0,0,0,.25)';
    b.onclick = function(){
      document.getElementById('sheet').className = '';
      if(k === it.category) return;
      it.category = k;
      render();
      api('/api/items?id=' + it.id, {method:'PATCH', body:JSON.stringify({category:k})}).catch(function(){ load(); });
    };
    box.appendChild(b);
  });
  document.getElementById('sheet').className = 'on';
}
document.getElementById('sheet').addEventListener('click', function(e){
  if(e.target === this) this.className = '';
});

/* ---------- 렌더링 ---------- */
function matches(it, f){
  if(f === 'all') return true;
  if(f === 'today'){
    if(!it.due_at) return false;
    var d = stripTime(new Date(it.due_at)).getTime();
    return d <= stripTime(new Date()).getTime();
  }
  if(f === 'schedule') return !!it.due_at || it.category === 'schedule';
  return it.category === f;
}

function render(){
  /* 필터 칩 */
  var chips = document.getElementById('chips');
  chips.innerHTML = '';
  FILTERS.forEach(function(f){
    var n = items.filter(function(it){ return !it.done && matches(it, f.id); }).length;
    var b = document.createElement('button');
    b.className = 'chip' + (filter === f.id ? ' on' : '');
    b.textContent = f.label;
    if(n > 0){
      var s = document.createElement('span');
      s.className = 'n'; s.textContent = n;
      b.appendChild(s);
    }
    b.onclick = function(){ filter = f.id; render(); };
    chips.appendChild(b);
  });

  var list = document.getElementById('list');
  list.innerHTML = '';
  var pend = items.filter(function(it){ return !it.done && matches(it, filter); });
  var done = items.filter(function(it){ return it.done && matches(it, filter); });

  pend.sort(function(a,b){
    if(a.due_at && b.due_at) return new Date(a.due_at) - new Date(b.due_at);
    if(a.due_at) return -1;
    if(b.due_at) return 1;
    return new Date(b.created_at) - new Date(a.created_at);
  });

  if(pend.length === 0 && done.length === 0){
    var e = document.createElement('div');
    e.className = 'empty';
    e.innerHTML = '<b>🌱</b>';
    var t = document.createElement('div');
    t.textContent = filter === 'all' ? '위 입력창에 뭐든 적어보세요. 분류는 모아가 할게요.' : '여기는 비어있어요';
    e.appendChild(t);
    list.appendChild(e);
  }

  pend.forEach(function(it){ list.appendChild(row(it)); });

  if(done.length > 0){
    var tg = document.createElement('button');
    tg.className = 'donetoggle';
    tg.textContent = showDone ? '완료된 항목 접기' : '완료됨 ' + done.length + '개 보기';
    tg.onclick = function(){ showDone = !showDone; render(); };
    list.appendChild(tg);
    if(showDone){
      done.sort(function(a,b){ return new Date(b.done_at||0) - new Date(a.done_at||0); });
      done.forEach(function(it){ list.appendChild(row(it)); });
    }
  }
}

function row(it){
  var div = document.createElement('div');
  div.className = 'item' + (it.done ? ' done' : '');
  var chk = document.createElement('button');
  chk.className = 'check';
  chk.onclick = function(){ toggleDone(it); };
  var body = document.createElement('div');
  body.className = 'body';
  var txt = document.createElement('div');
  txt.className = 'txt'; txt.textContent = it.content;
  var meta = document.createElement('div');
  meta.className = 'meta';
  var cat = document.createElement('button');
  cat.className = 'cat';
  cat.style.background = CATS[it.category] ? CATS[it.category].color : '#888';
  cat.textContent = CATS[it.category] ? CATS[it.category].label : it.category;
  cat.onclick = function(){ openSheet(it); };
  meta.appendChild(cat);
  var dl = dueLabel(it.due_at);
  if(dl){
    var due = document.createElement('span');
    due.className = 'due ' + dl.cls;
    due.textContent = dl.label;
    meta.appendChild(due);
  }
  body.appendChild(txt); body.appendChild(meta);
  var del = document.createElement('button');
  del.className = 'del'; del.textContent = '×';
  del.onclick = function(){ removeItem(it); };
  div.appendChild(chk); div.appendChild(body); div.appendChild(del);
  return div;
}

var toastTimer = null;
function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast on';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.className = 'toast'; }, 1800);
}

/* ---------- 음성 입력 ---------- */
(function(){
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  var mic = document.getElementById('mic');
  if(!SR){ mic.style.display = 'none'; return; }
  var rec = null, recording = false;
  mic.onclick = function(){
    if(recording){ rec.stop(); return; }
    rec = new SR();
    rec.lang = 'ko-KR';
    rec.interimResults = false;
    rec.onresult = function(ev){
      var s = ev.results[0][0].transcript;
      var inp = document.getElementById('inp');
      inp.value = (inp.value ? inp.value + ' ' : '') + s;
    };
    rec.onend = function(){ recording = false; mic.className = 'iconbtn'; };
    rec.onerror = function(){ recording = false; mic.className = 'iconbtn'; };
    recording = true; mic.className = 'iconbtn rec';
    rec.start();
  };
})();

document.getElementById('add').onclick = addItem;
document.getElementById('inp').addEventListener('keydown', function(e){
  if(e.key === 'Enter'){ e.preventDefault(); addItem(); }
});
var now = new Date();
document.getElementById('today').textContent =

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(function(){});
}

if(pin){
  hidePin();
  load();
}else{
  showPin(false);
}
setInterval(function(){ if(pin && !document.hidden) load(); }, 60000);
document.addEventListener('visibilitychange', function(){ if(!document.hidden && pin) load(); });
</script>
